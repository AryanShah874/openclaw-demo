<!doctype html>
<html>
<head>
  <title>Acme Landing</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      margin-bottom: 30px;
    }
    .subscribe-section {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 30px;
      margin-top: 20px;
    }
    .subscribe-section h2 {
      margin-top: 0;
      color: #444;
    }
    .subscribe-form {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    input[type="email"] {
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      min-width: 250px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0056b3;
    }
    #message {
      margin-top: 15px;
      font-weight: bold;
    }
    .success { color: #28a745; }
    .error { color: #dc3545; }
  </style>
</head>
<body>
  <h1>Welcome to Acme</h1>
  <p>The best product ever.</p>

  <div class="subscribe-section">
    <h2>Stay Updated</h2>
    <p>Subscribe to get the latest news and updates.</p>
    <div class="subscribe-form">
      <input type="email" id="email" placeholder="Enter your email" required>
      <button onclick="subscribe()">Subscribe</button>
    </div>
    <div id="message"></div>
  </div>

  <script>
    function subscribe() {
      const email = document.getElementById('email').value;
      const message = document.getElementById('message');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!email) {
        message.className = 'error';
        message.textContent = 'Please enter an email address.';
        return;
      }
      if (!emailRegex.test(email)) {
        message.className = 'error';
        message.textContent = 'Please enter a valid email address.';
        return;
      }

      message.className = 'success';
      message.textContent = 'Thank you for subscribing! (Backend integration pending)';
      document.getElementById('email').value = '';
    }
  </script>
</body>
</html>
